# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
source = ~/.config/hypr/style.conf
#source = ~/.config/hypr/bindings.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,1920x1080@120,auto,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nemo
#$fileManager = thunar
$menu = wofi --show drun
$browser = brave
$editor = zeditor

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = waybar & hypridle
exec-once = hyprpaper
exec-once = ~/.config/hypr/Scripts/wallpaper.sh
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = flameshot
exec-once = ~/.config/hypr/Scripts/hyprsunset.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_THEME,Qogir-dark-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
# env = WLR_RENDERER_ALLOW_SOFTWARE, 1
env = WLR_NO_HARDWARE_CURSORS, 1

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
##############
### MISC ###
##############

misc {
    vrr = 0  # Disable VRR for Steam Remote Play
    vfr = false  # Disable variable refresh rate
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

windowrule = suppress_event maximize, match:class .* # You'll probably like this.

# Telegram to workspace 2
windowrule = workspace 2 silent, match:class ^(org.telegram.desktop)$

# Discord to workspace 3
windowrule = workspace 3 silent, match:class ^(discord)$

# Steam dedicated workspace setup
#workspace = 4, persistent:true, gapsin:0, gapsout:0

# Steam to workspace 5 with optimizations
windowrule = workspace 5 silent, immediate on, force_rgbx on, match:class ^(steam)$
windowrule = immediate on, match:class ^(steamwebhelper)$

# Steam games optimizations
windowrule = immediate on, match:class ^(steam_app).*
#windowrulev2 = fullscreen, class:^(steam_app).*

# Prevent steam notifications from stealing focus
windowrule = no_initial_focus on, match:class ^(steam)$, match:title ^(notificationtoasts)

# Zed editor to workspace 4 (scrolling layout)
windowrule = workspace 4 silent, match:class ^(dev.zed.Zed)$


####################
### LAYOUTS ###
####################

# Workspace 4: scrolling layout for editor workflow
workspace = 4, layout:scrolling

scrolling {
    column_width = 0.5
    fullscreen_on_one_column = true
    follow_focus = true
    focus_fit_method = 1
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
    #wrap_focus = true
}


####################
### KEYBINDINGS  ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, R, exec, killall wofi || $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod SHIFT, F, fullscreen
#bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only #prefer flameshot to hyprshot
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/Scripts/gaming-mode-toggle.sh && pkill -RTMIN+8 waybar
bind = $mainMod SHIFT, S, exec, flameshot gui
#bind = $mainMod, L, exec, loginctl lock-session
bind = $mainMod, L, exec, hyprlock
bind = Ctrl+Alt, W, exec, killall waybar || waybar # toggle waybar
bind = $mainMod, B, exec, hyprsunset -t 4000 || hyprsunset
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod,TAB,workspace,previous

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, A, togglespecialworkspace, magic
bind = $mainMod SHIFT, A, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod SHIFT, mouse_down, workspace, e-1
bind = $mainMod SHIFT, mouse_up, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Scroll through windows in scrolling layout with mainMod + scroll
# Scroll columns in scrolling layout (ws4)
bind = $mainMod, mouse_down, layoutmsg, move -col
bind = $mainMod, mouse_up, layoutmsg, move +col
# Mover columna activa a izquierda/derecha
bind = $mainMod SHIFT, left,  layoutmsg, swapcol l
bind = $mainMod SHIFT, right, layoutmsg, swapcol r

# Promover ventana a su propia columna nueva
bind = $mainMod SHIFT, up, layoutmsg, promote
